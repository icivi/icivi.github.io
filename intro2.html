    <!-- Audio tag for background ambient sound - Click anywhere on screen to play if autoplay is blocked -->
    <audio id="myAudio" autoplay>
        <source src="/intro.mp3" type="audio/mpeg">
    </audio>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var audio = document.getElementById('myAudio');

            // Check if audio autoplays successfully
            audio.addEventListener('play', function() {
                console.log('Audio is autoplaying.');
            });

            audio.addEventListener('error', function() {
                console.log('Error playing audio.');
            });

            // If audio is blocked from autoplaying, add a one-time click listener to start it
            setTimeout(function() {
                if (audio.paused) {
                    document.addEventListener('click', function() {
                        audio.play();
                    }, { once: true });
                }
            }, 1000); // 1-second delay to check autoplay status
        });
    </script>
