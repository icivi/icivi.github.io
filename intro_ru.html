    <!-- Тег для воспроизведения MP3-файла  - Кликните по экрану для воспроизведения. -->
    <audio id="myAudio" autoplay>
        <source src="/intro.mp3" type="audio/mpeg">
    </audio>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var audio = document.getElementById('myAudio');

            // Проверяем, воспроизводится ли аудио автоматически
            audio.addEventListener('play', function() {
                console.log('Аудио воспроизводится автоматически.');
            });

            audio.addEventListener('error', function() {
                console.log('Ошибка воспроизведения аудио.');
            });

            // Если аудио не воспроизводится автоматически, добавляем обработчик клика
            setTimeout(function() {
                if (audio.paused) {
                    document.addEventListener('click', function() {
                        audio.play();
                    }, { once: true });
                }
            }, 1000); // Задержка в 1 секунду для проверки автовоспроизведения
        });
    </script>
